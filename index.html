            { id: 54, titulo: "Quesada Pasiega", descripcion: "Tarta tradicional cántabra, a base de queso fresco y huevos.", ingredientes: "Queso fresco, huevos, azúcar, mantequilla, harina, limón.", instrucciones: "Mezclar todos los ingredientes y hornear hasta que cuaje y se dore.", categoria: "Postre", dificultad: "Baja", imagen: "https://picsum.photos/400/250?random=54" },
            { id: 55, titulo: "Filloas Gallegas", descripcion: "Similares a los crepes, pero más finas, tradicionalmente rellenas de dulces.", ingredientes: "Harina, huevos, leche, agua, azúcar, sal.", instrucciones: "Mezclar los ingredientes para la masa, dejar reposar. Cocinar en una sartén fina.", categoria: "Postre", dificultad: "Baja", imagen: "https://picsum.photos/400/250?random=55" },
            { id: 56, titulo: "Melocotones en Vino", descripcion: "Melocotones frescos macerados en vino tinto con azúcar y canela.", ingredientes: "Melocotones maduros, vino tinto, azúcar, canela en rama.", instrucciones: "Pelar y cortar los melocotones, cocer en vino con azúcar y canela a fuego lento.", categoria: "Postre", dificultad: "Baja", imagen: "https://picsum.photos/400/250?random=56" },
            { id: 57, titulo: "Pestiños", descripcion: "Dulce frito andaluz con masa de harina, ajonjolí y vino, bañado en miel.", ingredientes: "Harina, ajonjolí, aceite de oliva, vino blanco, anís, miel.", instrucciones: "Amasar los ingredientes, freír los pestiños y bañarlos en miel caliente.", categoria: "Postre", dificultad: "Media", imagen: "https://picsum.photos/400/250?random=57" },
            { id: 58, titulo: "Buñuelos de Viento", descripcion: "Pequeñas bolitas de masa frita, muy ligeras, que se suelen rellenar con crema.", ingredientes: "Agua, mantequilla, harina, huevos, azúcar glas, crema pastelera.", instrucciones: "Hacer la masa 'choux', freír los buñuelos y, una vez fríos, rellenar con crema.", categoria: "Postre", dificultad: "Alta", imagen: "https://picsum.photos/400/250?random=58" },
            { id: 59, titulo: "Ensaimada de Mallorca", descripcion: "Postre en forma de espiral, con una masa dulce y esponjosa, típica de las Islas Baleares.", ingredientes: "Harina de fuerza, agua, azúcar, huevos, masa madre, manteca de cerdo.", instrucciones: "Amasar la masa y dejarla fermentar. Estirarla, untar con manteca y enrollarla en forma de espiral. Hornear.", categoria: "Postre", dificultad: "Alta", imagen: "https://picsum.photos/400/250?random=59" },
            { id: 60, titulo: "Pantxineta", descripcion: "Pastel vasco de hojaldre relleno de crema y cubierto de almendras.", ingredientes: "Hojaldre, yemas de huevo, leche, azúcar, almendras, mantequilla.", instrucciones: "Hacer la crema pastelera. Montar el pastel con el hojaldre, la crema y las almendras. Hornear.", categoria: "Postre", dificultad: "Media", imagen: "https://picsum.photos/400/250?random=60" }
        ];

        const getInitialState = (key, defaultValue) => {
            try {
                const storedValue = localStorage.getItem(key);
                return storedValue ? JSON.parse(storedValue) : defaultValue;
            } catch (error) {
                console.error("Error al cargar desde localStorage:", error);
                return defaultValue;
            }
        };

        const RecetaDetalle = ({ receta, onBack, onDelete }) => {
            return (
                <div className="max-w-4xl mx-auto my-8 p-6 bg-white dark:bg-gray-800 rounded-lg shadow-xl">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                        <button onClick={onBack} className="flex items-center text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-200 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            Volver a Recetas
                        </button>
                        <h2 className="text-3xl sm:text-4xl font-bold text-gray-900 dark:text-white">{receta.titulo}</h2>
                        <div className="flex-shrink-0 w-24"></div>
                    </div>
                    
                    <img src={receta.imagen} alt={receta.titulo} className="w-full h-80 object-cover rounded-lg mb-6 shadow-md"/>

                    <p className="text-lg mb-6 italic text-gray-600 dark:text-gray-400">{receta.descripcion}</p>
                    
                    <div className="grid md:grid-cols-2 gap-6">
                        <div>
                            <h3 className="font-semibold text-xl mb-2 text-indigo-600 dark:text-indigo-400">Ingredientes</h3>
                            <ul className="list-disc list-inside space-y-1 text-gray-700 dark:text-gray-300">
                                {receta.ingredientes.split(',').map((ing, index) => (
                                    <li key={index}>{ing.trim()}</li>
                                ))}
                            </ul>
                        </div>
                        <div>
                            <h3 className="font-semibold text-xl mb-2 text-indigo-600 dark:text-indigo-400">Instrucciones</h3>
                            <p className="text-gray-700 dark:text-gray-300">{receta.instrucciones}</p>
                        </div>
                    </div>

                    <div className="mt-8 text-center">
                        <button
                            onClick={() => {
                                onDelete(receta.id);
                                window.location.hash = '';
                            }}
                            className="px-6 py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition-colors"
                        >
                            Eliminar Receta
                        </button>
                    </div>
                </div>
            );
        };
        
        const AddRecipeForm = ({ onAdd, onClose }) => {
            const [newRecipe, setNewRecipe] = useState({
                titulo: '', descripcion: '', ingredientes: '', instrucciones: '', categoria: 'Aperitivo', dificultad: 'Baja', imagen: 'https://picsum.photos/400/250'
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setNewRecipe(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onAdd({ ...newRecipe, id: Date.now() });
                onClose();
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900 bg-opacity-75">
                    <div className="relative w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-lg shadow-lg p-6 bg-white dark:bg-gray-800 dark:text-white">
                        <div className="flex justify-between items-center mb-4 border-b pb-4">
                            <h2 className="text-2xl font-bold">Añadir Nueva Receta</h2>
                            <button onClick={onClose} className="text-4xl font-light leading-none text-gray-500 hover:text-red-500 dark:text-gray-300 dark:hover:text-red-400">&times;</button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <label className="block">
                                <span className="text-gray-700 dark:text-gray-300">Título:</span>
                                <input type="text" name="titulo" value={newRecipe.titulo} onChange={handleChange} required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600" />
                            </label>
                            <label className="block">
                                <span className="text-gray-700 dark:text-gray-300">Descripción:</span>
                                <textarea name="descripcion" value={newRecipe.descripcion} onChange={handleChange} required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600"></textarea>
                            </label>
                            <label className="block">
                                <span className="text-gray-700 dark:text-gray-300">Ingredientes (separados por comas):</span>
                                <textarea name="ingredientes" value={newRecipe.ingredientes} onChange={handleChange} required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600"></textarea>
                            </label>
                            <label className="block">
                                <span className="text-gray-700 dark:text-gray-300">Instrucciones:</span>
                                <textarea name="instrucciones" value={newRecipe.instrucciones} onChange={handleChange} required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600"></textarea>
                            </label>
                            <div className="flex space-x-4">
                                <label className="block w-1/2">
                                    <span className="text-gray-700 dark:text-gray-300">Categoría:</span>
                                    <select name="categoria" value={newRecipe.categoria} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm dark:bg-gray-700 dark:border-gray-600">
                                        {['Aperitivo', 'Primero', 'Segundo', 'Postre'].map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </label>
                                <label className="block w-1/2">
                                    <span className="text-gray-700 dark:text-gray-300">Dificultad:</span>
                                    <select name="dificultad" value={newRecipe.dificultad} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm dark:bg-gray-700 dark:border-gray-600">
                                        {['Baja', 'Media', 'Alta'].map(diff => <option key={diff} value={diff}>{diff}</option>)}
                                    </select>
                                </label>
                            </div>
                            <button type="submit" className="w-full px-4 py-2 mt-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-colors">Añadir Receta</button>
                        </form>
                    </div>
                </div>
            );
        };

        function App() {
            const [recetas, setRecetas] = useState(() => getInitialState('recetas', RECETAS_INICIALES));
            const [filtroCategoria, setFiltroCategoria] = useState('Todas');
            const [filtroDificultad, setFiltroDificultad] = useState('Todas');
            const [terminoBusqueda, setTerminoBusqueda] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(() => getInitialState('darkMode', false));
            const [favoritas, setFavoritas] = useState(() => getInitialState('favoritas', []));
            const [showAddForm, setShowAddForm] = useState(false);
            const [ordenAlfabetico, setOrdenAlfabetico] = useState(null); // 'asc' o 'desc'
            const [recetaDelDia, setRecetaDelDia] = useState(null);

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.substring(1);
                    if (hash.startsWith('receta-')) {
                        const id = parseInt(hash.split('-')[1]);
                        const recetaEncontrada = recetas.find(r => r.id === id);
                        if (recetaEncontrada) {
                            setSelectedReceta(recetaEncontrada);
                        }
                    } else {
                        setSelectedReceta(null);
                    }
                };

                window.addEventListener('hashchange', handleHashChange);
                handleHashChange();

                return () => window.removeEventListener('hashchange', handleHashChange);
            }, [recetas]);

            const [selectedReceta, setSelectedReceta] = useState(null);

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('darkMode', JSON.stringify(isDarkMode));
            }, [isDarkMode]);

            useEffect(() => {
                localStorage.setItem('recetas', JSON.stringify(recetas));
            }, [recetas]);

            useEffect(() => {
                localStorage.setItem('favoritas', JSON.stringify(favoritas));
            }, [favoritas]);

            useEffect(() => {
                const hoy = new Date().toDateString();
                const recetaGuardada = getInitialState('recetaDelDia', null);
                if (recetaGuardada && recetaGuardada.date === hoy) {
                    setRecetaDelDia(recetaGuardada.receta);
                } else {
                    const randomReceta = recetas[Math.floor(Math.random() * recetas.length)];
                    setRecetaDelDia(randomReceta);
                    localStorage.setItem('recetaDelDia', JSON.stringify({ date: hoy, receta: randomReceta }));
                }
            }, [recetas]);

            const toggleFavorito = (recetaId) => {
                setFavoritas(prevFavoritas => {
                    if (prevFavoritas.includes(recetaId)) {
                        return prevFavoritas.filter(id => id !== recetaId);
                    } else {
                        return [...prevFavoritas, recetaId];
                    }
                });
            };

            const handleAddReceta = (newRecipe) => {
                setRecetas(prevRecetas => [...prevRecetas, newRecipe]);
            };

            const handleDeleteReceta = (idToDelete) => {
                setRecetas(prevRecetas => prevRecetas.filter(receta => receta.id !== idToDelete));
                setFavoritas(prevFavoritas => prevFavoritas.filter(id => id !== idToDelete));
            };

            const getDificultadColor = (dificultad) => {
                switch(dificultad) {
                    case 'Baja': return 'bg-green-100 text-green-800 dark:bg-green-700 dark:text-green-200';
                    case 'Media': return 'bg-yellow-100 text-yellow-800 dark:bg-yellow-700 dark:text-yellow-200';
                    case 'Alta': return 'bg-red-100 text-red-800 dark:bg-red-700 dark:text-red-200';
                    default: return 'bg-gray-200 text-gray-800 dark:bg-gray-600 dark:text-gray-200';
                }
            };
            
            const recetasFiltradas = recetas
                .filter(receta => {
                    if (filtroCategoria === 'Favoritas') {
                        return favoritas.includes(receta.id);
                    }
                    return filtroCategoria === 'Todas' || receta.categoria === filtroCategoria;
                })
                .filter(receta =>
                    filtroDificultad === 'Todas' || receta.dificultad === filtroDificultad
                )
                .filter(receta =>
                    receta.titulo.toLowerCase().includes(terminoBusqueda.toLowerCase()) ||
                    receta.descripcion.toLowerCase().includes(terminoBusqueda.toLowerCase()) ||
                    receta.ingredientes.toLowerCase().includes(terminoBusqueda.toLowerCase())
                )
                .sort((a, b) => {
                    if (ordenAlfabetico === 'asc') {
                        return a.titulo.localeCompare(b.titulo);
                    }
                    if (ordenAlfabetico === 'desc') {
                        return b.titulo.localeCompare(a.titulo);
                    }
                    return 0;
                });

            const totalRecetas = recetas.length;
            const categorias = ['Todas', 'Aperitivo', 'Primero', 'Segundo', 'Postre', 'Favoritas'];
            const dificultades = ['Todas', 'Baja', 'Media', 'Alta'];

            if (selectedReceta) {
                return <RecetaDetalle receta={selectedReceta} onBack={() => window.location.hash = ''} onDelete={handleDeleteReceta} />;
            }
            
            return (
                <div className="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white p-4 sm:p-8 transition-colors duration-300">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex flex-col sm:flex-row justify-between items-center mb-8">
                            <h1 className="text-3xl sm:text-4xl font-bold text-center w-full sm:text-left">Recetas de la Cocina Española</h1>
                            <button
                                onClick={() => setIsDarkMode(!isDarkMode)}
                                className={`p-2 rounded-full transition-colors duration-200 mt-4 sm:mt-0 ${isDarkMode ? 'bg-gray-700 text-white' : 'bg-white text-gray-800'}`}
                            >
                                {isDarkMode ? '🌙' : '☀️'}
                            </button>
                        </div>
                        <p className="text-center text-lg mb-6">Un total de **{totalRecetas}** recetas disponibles para explorar.</p>

                        {recetaDelDia && (
                            <div className="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-8 text-center border-l-4 border-indigo-500">
                                <h3 className="text-xl font-bold text-indigo-600 dark:text-indigo-400">📅 Receta del Día</h3>
                                <h4 className="text-2xl font-semibold mt-2">{recetaDelDia.titulo}</h4>
                                <p className="text-sm mt-1 text-gray-600 dark:text-gray-400">{recetaDelDia.descripcion}</p>
                            </div>
                        )}
                        
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 space-y-4 md:space-y-0">
                            <input
                                type="text"
                                placeholder="Buscar por título, ingredientes..."
                                className={`w-full md:w-1/3 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 ${isDarkMode ? 'bg-gray-700 border-gray-600 text-white' : 'bg-white border-gray-300 text-gray-700'}`}
                                value={terminoBusqueda}
                                onChange={(e) => setTerminoBusqueda(e.target.value)}
                            />
                            <div className="flex flex-wrap justify-center md:space-x-2 space-x-1 mt-4 md:mt-0">
                                {categorias.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => { setFiltroCategoria(cat); setFiltroDificultad('Todas'); }}
                                        className={`px-3 py-1 rounded-md text-sm transition-colors duration-200 ${
                                            (filtroCategoria === cat && cat !== 'Favoritas') ? 'bg-indigo-600 text-white shadow-lg' :
                                            filtroCategoria === 'Favoritas' && cat === 'Favoritas' ? 'bg-pink-600 text-white shadow-lg' :
                                            isDarkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-white text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        {cat === 'Favoritas' ? '⭐ Favoritas' : cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-wrap justify-center items-center mb-6 space-x-2">
                            <span className="text-sm text-gray-600 dark:text-gray-400">Filtrar por Dificultad:</span>
                            {dificultades.map(diff => (
                                <button
                                    key={diff}
                                    onClick={() => { setFiltroDificultad(diff); setFiltroCategoria('Todas'); }}
                                    className={`px-3 py-1 rounded-md text-sm transition-colors duration-200 ${
                                        filtroDificultad === diff ? 'bg-gray-800 text-white dark:bg-gray-200 dark:text-gray-800' :
                                        isDarkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-white text-gray-700 hover:bg-gray-200'
                                    }`}
                                >
                                    {diff}
                                </button>
                            ))}
                        </div>

                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center space-x-2">
                                <span className="text-sm text-gray-600 dark:text-gray-400">Ordenar por Título:</span>
                                <button
                                    onClick={() => setOrdenAlfabetico(ordenAlfabetico === 'asc' ? 'desc' : 'asc')}
                                    className="px-2 py-1 rounded-md text-sm bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors"
                                >
                                    {ordenAlfabetico === 'asc' ? 'A-Z' : ordenAlfabetico === 'desc' ? 'Z-A' : 'A-Z'}
                                </button>
                            </div>
                            <button
                                onClick={() => setShowAddForm(true)}
                                className="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors"
                            >
                                Añadir Receta
                            </button>
                        </div>
                
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {recetasFiltradas.length > 0 ? (
                                recetasFiltradas.map(receta => (
                                    <div 
                                        key={receta.id} 
                                        className={`rounded-lg shadow-lg overflow-hidden transform transition duration-300 hover:scale-105 hover:shadow-xl relative ${isDarkMode ? 'bg-gray-800' : 'bg-white'}`}
                                    >
                                        <div className="relative">
                                            <img src={receta.imagen} alt={receta.titulo} className="w-full h-48 object-cover"/>
                                            <button
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    toggleFavorito(receta.id);
                                                }}
                                                className={`absolute top-3 right-3 p-2 rounded-full backdrop-blur-sm bg-black/30 transition-transform transform ${favoritas.includes(receta.id) ? 'text-red-500 animate-pulse' : 'text-gray-400 hover:text-red-500'}`}
                                            >
                                                ⭐
                                            </button>
                                        </div>
                                        <div className="p-6">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className={`inline-block text-xs font-semibold px-3 py-1 rounded-full ${
                                                    receta.categoria === 'Aperitivo' ? 'bg-amber-100 text-amber-800 dark:bg-amber-700 dark:text-amber-100' :
                                                    receta.categoria === 'Primero' ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-700 dark:text-emerald-100' :
                                                    receta.categoria === 'Segundo' ? 'bg-sky-100 text-sky-800 dark:bg-sky-700 dark:text-sky-100' :
                                                    'bg-pink-100 text-pink-800 dark:bg-pink-700 dark:text-pink-100'
                                                }`}>
                                                    {receta.categoria}
                                                </span>
                                                <span className={`inline-block text-xs font-semibold px-3 py-1 rounded-full ${getDificultadColor(receta.dificultad)}`}>
                                                    {receta.dificultad}
                                                </span>
                                            </div>
                                            <a href={`#receta-${receta.id}`} className="block">
                                                <h2 className={`text-xl font-bold mb-2 ${isDarkMode ? 'text-white' : 'text-gray-900'}`}>{receta.titulo}</h2>
                                                <p className={`text-sm mb-4 line-clamp-2 ${isDarkMode ? 'text-gray-300' : 'text-gray-600'}`}>{receta.descripcion}</p>
                                            </a>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <p className="col-span-full text-center text-lg text-gray-500">No se encontraron recetas.</p>
                            )}
                        </div>

                        {showAddForm && <AddRecipeForm onAdd={handleAddReceta} onClose={() => setShowAddForm(false)} />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
