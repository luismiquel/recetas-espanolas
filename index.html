<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recetas de Cocina Española</title>
  <style>
    :root { --bg: #fff8f0; --fg: #333; --primary: #d62828; --secondary: #f4a261; }
    [data-theme="dark"] { --bg: #2b2b2b; --fg: #eee; --primary: #ff7f50; --secondary: #555; }
    body { font-family: sans-serif; margin:0; padding:0; background:var(--bg); color:var(--fg); transition: background .3s, color .3s; }
    header { background:var(--primary); color:white; padding:1rem; text-align:center; }
    nav { background:var(--secondary); padding:0.5rem; text-align:center; }
    nav a { margin:0 1rem; color:white; text-decoration:none; font-weight:bold; }
    .controls { padding:1rem; text-align:center; background:var(--secondary); }
    .controls input, .controls select, .controls button { margin:0 .5rem; padding:.5rem; font-size:1rem; }
    section { padding:2rem; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:1rem; margin-top:1rem; }
    .receta { position:relative; background:var(--bg); border-radius:8px; padding:1rem; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer; }
    .receta img { width:100%; border-radius:8px; }
    .info { font-size:.9rem; color:var(--fg); margin-top:.5rem; }
    .star { position:absolute; top:8px; right:8px; font-size:1.5rem; cursor:pointer; color:#ccc; }
    .star.fav { color:#e74c3c; }
    #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
    #modal .content { background:white; padding:2rem; border-radius:8px; max-width:500px; width:90%; position:relative; }
    #modal .close { position:absolute; top:10px; right:10px; cursor:pointer; font-size:1.5rem; }
  </style>
</head>
<body data-theme="light">
  <header>
    <h1>Recetas de Cocina Española</h1>
    <p>Auténticas recetas organizadas por tiempos de comida</p>
  </header>
  <nav>
    <a href="#aperitivos">Aperitivos</a>
    <a href="#primer-plato">Primer Plato</a>
    <a href="#segundo-plato">Segundo Plato</a>
    <a href="#postre">Postre</a>
  </nav>
  <div class="controls">
    <input type="text" id="search" placeholder="Buscar recetas...">
    <select id="sort">
      <option value="">Ordenar por tiempo</option>
      <option value="asc">Tiempo ascendente</option>
      <option value="desc">Tiempo descendente</option>
    </select>
    <label><input type="checkbox" id="favoritesOnly"> Solo favoritas</label>
    <button id="themeToggle">🌙</button>
  </div>

  <section id="aperitivos">
    <h2>🧀 Aperitivos</h2>
    <div class="grid" id="contenedor-aperitivos"></div>
  </section>

  <section id="primer-plato">
    <h2>🥗 Primer Plato</h2>
    <div class="grid" id="contenedor-primer-plato"></div>
  </section>

  <section id="segundo-plato">
    <h2>🍖 Segundo Plato</h2>
    <div class="grid" id="contenedor-segundo-plato"></div>
  </section>

  <section id="postre">
    <h2>🍮 Postre</h2>
    <div class="grid" id="contenedor-postre"></div>
  </section>

  <div id="modal">
    <div class="content">
      <span class="close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script defer>
    // Array estático con recetas reales
    const recetas = [
      { categoria: 'aperitivos', titulo: 'Tortilla Española', img: 'https://upload.wikimedia.org/wikipedia/commons/5/5f/Tortilla_de_patatas.jpg', descripcion: 'Tortilla de patatas clásica con cebolla.', ingredientes: ['4 huevos','500 g de patatas','1 cebolla','Aceite','Sal'], instrucciones: ['Pelar y cortar patatas y cebolla','Freír a fuego medio','Batir los huevos','Mezclar con patata y cuajar','Servir caliente'], tiempo: 30, dificultad: 'Media', fav: false },
      { categoria: 'aperitivos', titulo: 'Boquerones en Vinagre', img: 'https://upload.wikimedia.org/wikipedia/commons/2/20/Boquerones_en_vinagre.jpg', descripcion: 'Boquerones frescos marinados en vinagre.', ingredientes: ['500 g de boquerones','250 ml de vinagre','2 dientes de ajo','Perejil','Aceite','Sal'], instrucciones: ['Limpiar boquerones','Marinar en vinagre 1h','Escurrir','Aliñar con ajo picado y perejil','Añadir aceite'], tiempo: 60, dificultad: 'Fácil', fav: false },
      // ... añade aquí las 38 recetas restantes siguiendo el mismo formato
    ];

    // Cargar favoritos de localStorage
    const favs = JSON.parse(localStorage.getItem('favs')||'{}');
    recetas.forEach(r=>{ if(favs[r.titulo]) r.fav=true; });

    document.addEventListener('DOMContentLoaded',()=>{
      // Debug
      const debug = document.createElement('div'); debug.id='debug'; debug.textContent=`Recetas cargadas: ${recetas.length}`;
      document.body.insertBefore(debug,document.querySelector('section'));

      const cont = {
        'aperitivos': document.getElementById('contenedor-aperitivos'),
        'primer-plato': document.getElementById('contenedor-primer-plato'),
        'segundo-plato': document.getElementById('contenedor-segundo-plato'),
        'postre': document.getElementById('contenedor-postre')
      };
      const modal = document.getElementById('modal'), modalBody = document.getElementById('modalBody');
      document.querySelector('#modal .close').onclick = ()=> modal.style.display='none';
      document.getElementById('themeToggle').onclick = ()=>{
        const b = document.body;
        b.dataset.theme = b.dataset.theme==='light'?'dark':'light';
        document.getElementById('themeToggle').textContent = b.dataset.theme==='dark'?'☀️':'🌙';
      };

      function saveFavs(){
        const store = {};
        recetas.forEach(r=>{ if(r.fav) store[r.titulo]=true; });
        localStorage.setItem('favs', JSON.stringify(store));
      }

      function render(list){
        // Limpiar
        Object.values(cont).forEach(div=>div.innerHTML='');
        list.forEach(r=>{
          if(document.getElementById('favoritesOnly').checked && !r.fav) return;
          const card = document.createElement('div'); card.className='receta'; card.dataset.tiempo=r.tiempo;
          // Ingredientes e instrucciones como lista
          const ing = `<ul>${r.ingredientes.map(i=>`<li>${i}</li>`).join('')}</ul>`;
          const pas = `<ol>${r.instrucciones.map(p=>`<li>${p}</li>`).join('')}</ol>`;
          card.innerHTML = `
            <div class="star ${r.fav?'fav':''}" data-title="${r.titulo}">★</div>
            <h3>${r.titulo}</h3>
            <img src="${r.img}" alt="${r.titulo}">
            <p><strong>Descripción:</strong> ${r.descripcion}</p>
            <p><strong>Ingredientes:</strong>${ing}</p>
            <p><strong>Instrucciones:</strong>${pas}</p>
            <p class="info">⏱ ${r.tiempo} min | 🔥 ${r.dificultad}</p>
          `;
          card.onclick = ()=>{
            modalBody.innerHTML = card.innerHTML;
            modal.style.display='flex';
          };
          cont[r.categoria].appendChild(card);
        });
        // Añadir evento favoritos
        document.querySelectorAll('.star').forEach(s=>s.onclick=e=>{
          e.stopPropagation();
          const title = s.dataset.title;
          const rec = recetas.find(r=>r.titulo===title);
          rec.fav = !rec.fav;
          saveFavs();
          render(filtered());
        });
      }

      function filtered(){
        let res = [...recetas];
        const term = document.getElementById('search').value.toLowerCase();
        if(term) res = res.filter(r=> r.titulo.toLowerCase().includes(term) || r.descripcion.toLowerCase().includes(term));
        const sortv = document.getElementById('sort').value;
        if(sortv==='asc') res.sort((a,b)=>a.tiempo-b.tiempo);
        if(sortv==='desc') res.sort((a,b)=>b.tiempo-a.tiempo);
        return res;
      }

      // Listeners
      ['search','sort','favoritesOnly'].forEach(id=>
        document.getElementById(id).addEventListener('input',()=>render(filtered()))
      );

      render(recetas);
    });
  </script>
</body>
</html>
