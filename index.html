<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recetas de Cocina Española</title>
  <style>
    body { font-family: sans-serif; margin:0; padding:0; background:#fff8f0; color:#333; }
    header { background:#d62828; color:white; padding:1rem; text-align:center; }
    nav { background:#f4a261; padding:0.5rem; text-align:center; }
    nav a { margin:0 1rem; color:white; text-decoration:none; font-weight:bold; }
    section { padding:2rem; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:1rem; margin-top:1rem; }
    h2 { color:#d62828; margin-top:0; }
    .receta { background:white; border-radius:8px; padding:1rem; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .receta img { width:100%; border-radius:8px; }
    .info { font-size:0.9rem; color:#666; margin-top:0.5rem; }
    #debug { text-align:center; padding:1rem; background:#f0e8dd; font-weight:bold; margin:1rem; }
  </style>
</head>
<body>
  <header>
    <h1>Recetas de Cocina Española</h1>
    <p>Auténticas recetas organizadas por tiempos de comida</p>
  </header>
  <nav>
    <a href="#aperitivos">Aperitivos</a>
    <a href="#primer-plato">Primer Plato</a>
    <a href="#segundo-plato">Segundo Plato</a>
    <a href="#postre">Postre</a>
  </nav>

  <section id="aperitivos">
    <h2>🧀 Aperitivos</h2>
    <div class="grid" id="contenedor-aperitivos"></div>
  </section>

  <section id="primer-plato">
    <h2>🥗 Primer Plato</h2>
    <div class="grid" id="contenedor-primer-plato"></div>
  </section>

  <section id="segundo-plato">
    <h2>🍖 Segundo Plato</h2>
    <div class="grid" id="contenedor-segundo-plato"></div>
  </section>

  <section id="postre">
    <h2>🍮 Postre</h2>
    <div class="grid" id="contenedor-postre"></div>
  </section>

  <script>
    const recetas = [
      { categoria: 'aperitivos', titulo: 'Pan con Tomate', img: 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Pan_con_tomate_01.jpg', descripcion: 'Rebanadas de pan con tomate rallado y aceite de oliva.', ingredientes: 'Pan, tomate, aceite de oliva, sal.', instrucciones: 'Frotar tomate sobre pan, aliñar con aceite y sal.', tiempo: '10 min', dificultad: 'Fácil' },
      { categoria: 'aperitivos', titulo: 'Croquetas de Jamón', img: 'https://upload.wikimedia.org/wikipedia/commons/7/7b/Croquetas._JPG', descripcion: 'Crujientes por fuera, cremosas por dentro.', ingredientes: 'Leche, harina, mantequilla, jamón, huevo, pan rallado.', instrucciones: 'Preparar bechamel, mezclar jamón, formar, empanar y freír.', tiempo: '45 min', dificultad: 'Media' },
      { categoria: 'aperitivos', titulo: 'Tortilla de Patatas', img: 'https://upload.wikimedia.org/wikipedia/commons/5/5f/Tortilla_de_patatas.jpg', descripcion: 'Clásica tortilla española.', ingredientes: 'Huevos, patata, cebolla, aceite, sal.', instrucciones: 'Freír patata y cebolla, mezclar con huevo y cuajar.', tiempo: '30 min', dificultad: 'Media' },
      { categoria: 'aperitivos', titulo: 'Boquerones en Vinagre', img: 'https://upload.wikimedia.org/wikipedia/commons/2/20/Boquerones_en_vinagre.jpg', descripcion: 'Boquerones marinados en vinagre.', ingredientes: 'Boquerones, vinagre, ajo, perejil, aceite, sal.', instrucciones: 'Marinar pescado en vinagre, aliñar con ajo y perejil.', tiempo: '1 h', dificultad: 'Fácil' },
      { categoria: 'aperitivos', titulo: 'Pimientos de Padrón', img: 'https://upload.wikimedia.org/wikipedia/commons/0/04/Pimientos_de_Padron.jpg', descripcion: 'Pimientos verdes fritos con sal gruesa.', ingredientes: 'Pimientos, aceite, sal gruesa.', instrucciones: 'Freír y espolvorear sal.', tiempo: '15 min', dificultad: 'Fácil' },
      { categoria: 'aperitivos', titulo: 'Gazpacho', img: 'https://upload.wikimedia.org/wikipedia/commons/9/90/Gazpacho.jpg', descripcion: 'Sopa fría de tomate.', ingredientes: 'Tomate, pepino, pimiento, ajo, aceite, vinagre, sal.', instrucciones: 'Triturar todo y refrigerar.', tiempo: '15 min', dificultad: 'Fácil' },
      { categoria: 'aperitivos', titulo: 'Jamón y Queso', img: 'https://upload.wikimedia.org/wikipedia/commons/b/b8/Jamon_Iberico.jpg', descripcion: 'Selección de jamón ibérico y queso manchego.', ingredientes: 'Jamón, queso.', instrucciones: 'Cortar y servir.', tiempo: '5 min', dificultad: 'Fácil' },
      { categoria: 'aperitivos', titulo: 'Ensaladilla Rusa', img: 'https://upload.wikimedia.org/wikipedia/commons/2/2e/Ensaladilla_Rusa.jpg', descripcion: 'Mezcla de patata, guisantes y mayonesa.', ingredientes: 'Patata, zanahoria, guisantes, mayonesa, atún.', instrucciones: 'Hervir patatas, mezclar y refrigerar.', tiempo: '40 min', dificultad: 'Fácil' },
      { categoria: 'aperitivos', titulo: 'Empanadillas de Atún', img: 'https://upload.wikimedia.org/wikipedia/commons/4/4f/Empanadillas.jpg', descripcion: 'Masa rellena de atún y tomate.', ingredientes: 'Masa, atún, tomate, huevo.', instrucciones: 'Rellenar, cerrar y freír.', tiempo: '30 min', dificultad: 'Media' },
      { categoria: 'aperitivos', titulo: 'Queso de Cabra con Miel', img: 'https://upload.wikimedia.org/wikipedia/commons/5/56/Queso_de_cabra_y_miel.jpg', descripcion: 'Queso de cabra con miel y nueces.', ingredientes: 'Queso, miel, nueces.', instrucciones: 'Montar y servir.', tiempo: '10 min', dificultad: 'Fácil' },
      // Primer Plato
      // ... completar las 10 recetas restantes siguiendo el mismo patrón ...
    ];

    document.addEventListener('DOMContentLoaded', () => {
      alert(`Script cargado: ${recetas.length} recetas disponibles`);
      const debug = document.createElement('div');
      debug.id = 'debug';
      debug.textContent = `Recetas cargadas: ${recetas.length}`;
      document.body.insertBefore(debug, document.getElementById('aperitivos'));

      const contenedores = {
        'aperitivos': document.getElementById('contenedor-aperitivos'),
        'primer-plato': document.getElementById('contenedor-primer-plato'),
        'segundo-plato': document.getElementById('contenedor-segundo-plato'),
        'postre': document.getElementById('contenedor-postre')
      };

      recetas.forEach(r => {
        const card = document.createElement('div');
        card.className = 'receta';
        card.innerHTML = `
          <h3>${r.titulo}</h3>
          <img src="${r.img}" alt="${r.titulo}">
          <p><strong>Descripción:</strong> ${r.descripcion}</p>
          <p><strong>Ingredientes:</strong> ${r.ingredientes}</p>
          <p><strong>Instrucciones:</strong> ${r.instrucciones}</p>
          <p class="info">⏱ ${r.tiempo} | 🔥 ${r.dificultad}</p>
        `;
        contenedores[r.categoria].appendChild(card);
      });
    });
  </script>
</body>
</html>
