<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recetas de Cocina Española</title>
  <style>
    :root { --bg: #fff8f0; --fg: #333; --primary: #d62828; --secondary: #f4a261; --tab-active: #c53838; }
    [data-theme="dark"] { --bg: #2b2b2b; --fg: #eee; --primary: #ff7f50; --secondary: #555; --tab-active: #f19a4e; }
    body { font-family: sans-serif; margin:0; padding:0; background:var(--bg); color:var(--fg); transition: background .3s, color .3s; }
    header { background:var(--primary); color:white; padding:1rem; text-align:center; }
    nav { display: none; }
    .controls { padding:1rem; text-align:center; background:var(--secondary); }
    .controls input, .controls select, .controls button { margin:0 .5rem; padding:.5rem; font-size:1rem; }
    section { padding:2rem; display: none; }
    section.active { display: block; }
    .tabs { display: flex; justify-content: center; background:var(--secondary); padding: 0.5rem; }
    .tab-button { background: none; border: none; color: white; padding: 0.5rem 1rem; margin: 0 0.5rem; cursor: pointer; font-weight: bold; border-radius: 5px; transition: background-color .3s; }
    .tab-button.active { background-color: var(--tab-active); }
    .tab-button:hover:not(.active) { background-color: rgba(255, 255, 255, 0.2); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:1rem; margin-top:1rem; }
    .receta { position:relative; background:var(--bg); border-radius:8px; padding:1rem; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer; }
    .receta img { width:100%; border-radius:8px; }
    .info { font-size:.9rem; color:var(--fg); margin-top:.5rem; }
    .star { position:absolute; top:8px; right:8px; font-size:1.5rem; cursor:pointer; color:#ccc; }
    .star.fav { color:#e74c3c; }
    #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
    #modal .content { background:white; padding:2rem; border-radius:8px; max-width:500px; width:90%; position:relative; }
    #modal .close { position:absolute; top:10px; right:10px; cursor:pointer; font-size:1.5rem; }
    #recipe-form { display: flex; flex-direction: column; gap: 1rem; max-width: 500px; margin: 0 auto; }
    #recipe-form label { font-weight: bold; margin-top: 1rem; }
    #recipe-form input, #recipe-form textarea, #recipe-form select { padding: 0.5rem; border-radius: 5px; border: 1px solid #ccc; }
    #recipe-form button { padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
  </style>
</head>
<body data-theme="light">
  <header>
    <h1>Recetas de Cocina Española</h1>
    <p>Auténticas recetas organizadas por tiempos de comida</p>
  </header>
  <div class="tabs">
    <button class="tab-button active" data-tab="aperitivos">Aperitivos</button>
    <button class="tab-button" data-tab="primer-plato">Primer Plato</button>
    <button class="tab-button" data-tab="segundo-plato">Segundo Plato</button>
    <button class="tab-button" data-tab="postre">Postre</button>
    <button class="tab-button" data-tab="add-recipe">Añadir Receta</button>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Buscar recetas...">
    <select id="sort">
      <option value="">Ordenar por tiempo</option>
      <option value="asc">Tiempo ascendente</option>
      <option value="desc">Tiempo descendente</option>
    </select>
    <label><input type="checkbox" id="favoritesOnly"> Solo favoritas</label>
    <button id="themeToggle">🌙</button>
  </div>

  <section id="aperitivos" class="active">
    <h2>🧀 Aperitivos</h2>
    <div class="grid" id="contenedor-aperitivos"></div>
  </section>
  <section id="primer-plato">
    <h2>🥗 Primer Plato</h2>
    <div class="grid" id="contenedor-primer-plato"></div>
  </section>
  <section id="segundo-plato">
    <h2>🍖 Segundo Plato</h2>
    <div class="grid" id="contenedor-segundo-plato"></div>
  </section>
  <section id="postre">
    <h2>🍮 Postre</h2>
    <div class="grid" id="contenedor-postre"></div>
  </section>
  <section id="add-recipe">
    <h2>📝 Añadir Nueva Receta</h2>
    <form id="recipe-form">
      <label for="titulo">Título:</label>
      <input type="text" id="titulo" name="titulo" required>
      <label for="img">URL de la Imagen:</label>
      <input type="text" id="img" name="img" required>
      <label for="descripcion">Descripción:</label>
      <textarea id="descripcion" name="descripcion" required></textarea>
      <label for="categoria">Categoría:</label>
      <select id="categoria" name="categoria" required>
        <option value="aperitivos">Aperitivos</option>
        <option value="primer-plato">Primer Plato</option>
        <option value="segundo-plato">Segundo Plato</option>
        <option value="postre">Postre</option>
      </select>
      <label for="ingredientes">Ingredientes (separados por comas):</label>
      <input type="text" id="ingredientes" name="ingredientes" required>
      <label for="instrucciones">Instrucciones (separadas por comas):</label>
      <input type="text" id="instrucciones" name="instrucciones" required>
      <label for="tiempo">Tiempo (minutos):</label>
      <input type="number" id="tiempo" name="tiempo" required>
      <label for="dificultad">Dificultad:</label>
      <select id="dificultad" name="dificultad" required>
        <option value="Fácil">Fácil</option>
        <option value="Media">Media</option>
        <option value="Difícil">Difícil</option>
      </select>
      <button type="submit">Añadir Receta</button>
    </form>
  </section>

  <div id="modal">
    <div class="content">
      <span class="close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="recetas.js" defer></script>
  <script defer>
    let allRecetas = [];
    const favs = JSON.parse(localStorage.getItem('favs') || '{}');
    
    document.addEventListener('DOMContentLoaded', () => {
      // Combina las recetas estáticas con las del usuario al inicio
      const userRecetas = JSON.parse(localStorage.getItem('userRecetas') || '[]');
      allRecetas = [...recetas, ...userRecetas];
      allRecetas.forEach(r => { if (favs[r.titulo]) r.fav = true; });

      const debug = document.createElement('div'); debug.id = 'debug'; debug.textContent = `Recetas cargadas: ${allRecetas.length}`;
      document.body.insertBefore(debug, document.querySelector('.tabs'));

      const cont = {
        'aperitivos': document.getElementById('contenedor-aperitivos'),
        'primer-plato': document.getElementById('contenedor-primer-plato'),
        'segundo-plato': document.getElementById('contenedor-segundo-plato'),
        'postre': document.getElementById('contenedor-postre')
      };
      const modal = document.getElementById('modal'), modalBody = document.getElementById('modalBody');
      document.querySelector('#modal .close').onclick = () => modal.style.display = 'none';
      document.getElementById('themeToggle').onclick = () => {
        const b = document.body;
        b.dataset.theme = b.dataset.theme === 'light' ? 'dark' : 'light';
        document.getElementById('themeToggle').textContent = b.dataset.theme === 'dark' ? '☀️' : '🌙';
      };

      function saveFavs() {
        const store = {};
        allRecetas.forEach(r => { if (r.fav) store[r.titulo] = true; });
        localStorage.setItem('favs', JSON.stringify(store));
      }

      function handleFavClick(e) {
        e.stopPropagation();
        const card = e.currentTarget.closest('.receta');
        const title = card.dataset.title;
        const rec = allRecetas.find(r => r.titulo === title);
        if (rec) {
          rec.fav = !rec.fav;
          saveFavs();
          render();
        }
      }

      const allCards = [];

      function createAllCards() {
        allCards.length = 0; // Limpiar el array para recrear las tarjetas
        Object.values(cont).forEach(div => div.innerHTML = ''); // Limpiar los contenedores
        
        allRecetas.forEach(receta => {
          const card = document.createElement('div');
          card.className = 'receta';
          card.dataset.tiempo = receta.tiempo;
          card.dataset.categoria = receta.categoria;
          card.dataset.title = receta.titulo;

          const ing = `<ul>${receta.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>`;
          const pas = `<ol>${receta.instrucciones.map(p => `<li>${p}</li>`).join('')}</ol>`;

          card.innerHTML = `
            <div class="star ${receta.fav ? 'fav' : ''}" data-title="${receta.titulo}">★</div>
            <h3>${receta.titulo}</h3>
            <img src="${receta.img}" alt="${receta.titulo}">
            <p><strong>Descripción:</strong> ${receta.descripcion}</p>
            <p><strong>Ingredientes:</strong>${ing}</p>
            <p><strong>Instrucciones:</strong>${pas}</p>
            <p class="info">⏱ ${receta.tiempo} min | 🔥 ${receta.dificultad}</p>
          `;
          
          card.onclick = () => {
            modalBody.innerHTML = card.innerHTML;
            modal.style.display = 'flex';
            const modalStar = modalBody.querySelector('.star');
            if (modalStar) modalStar.onclick = handleFavClick;
          };

          card.querySelector('.star').onclick = handleFavClick;
          allCards.push(card);
        });

        allCards.forEach(card => {
          cont[card.dataset.categoria].appendChild(card);
        });
      }

      function render() {
        const term = document.getElementById('search').value.toLowerCase();
        const sortv = document.getElementById('sort').value;
        const favsOnly = document.getElementById('favoritesOnly').checked;
        const activeTab = document.querySelector('.tab-button.active').dataset.tab;

        let visibleCards = [...allCards];

        if (favsOnly) {
          visibleCards = visibleCards.filter(card => allRecetas.find(r => r.titulo === card.dataset.title).fav);
        }

        if (term) {
          visibleCards = visibleCards.filter(card => card.dataset.title.toLowerCase().includes(term) || card.querySelector('p').textContent.toLowerCase().includes(term));
        }

        if (sortv === 'asc') {
          visibleCards.sort((a, b) => a.dataset.tiempo - b.dataset.tiempo);
        }
        if (sortv === 'desc') {
          visibleCards.sort((a, b) => b.dataset.tiempo - a.dataset.tiempo);
        }

        allCards.forEach(card => {
          const isVisible = visibleCards.includes(card) && card.dataset.categoria === activeTab;
          card.style.display = isVisible ? 'block' : 'none';
        });
      }

      function showTab(tabName) {
        document.querySelectorAll('section').forEach(section => {
          section.classList.remove('active');
        });
        document.getElementById(tabName).classList.add('active');
        document.querySelectorAll('.tab-button').forEach(button => {
          button.classList.remove('active');
          if (button.dataset.tab === tabName) {
            button.classList.add('active');
          }
        });
        render();
      }

      ['search', 'sort', 'favoritesOnly'].forEach(id =>
        document.getElementById(id).addEventListener('input', render)
      );

      document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', () => {
          showTab(button.dataset.tab);
        });
      });

      // Lógica para guardar las nuevas recetas
      const recipeForm = document.getElementById('recipe-form');
      recipeForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const newRecipe = {
          categoria: document.getElementById('categoria').value,
          titulo: document.getElementById('titulo').value,
          img: document.getElementById('img').value,
          descripcion: document.getElementById('descripcion').value,
          ingredientes: document.getElementById('ingredientes').value.split(',').map(s => s.trim()),
          instrucciones: document.getElementById('instrucciones').value.split(',').map(s => s.trim()),
          tiempo: parseInt(document.getElementById('tiempo').value),
          dificultad: document.getElementById('dificultad').value,
          fav: false
        };

        allRecetas.push(newRecipe);
        saveUserRecetas(); // Función para guardar en localStorage
        createAllCards();
        showTab(newRecipe.categoria);
        recipeForm.reset();
      });

      function saveUserRecetas() {
        const userRecetas = allRecetas.filter(r => !r.isStatic);
        localStorage.setItem('userRecetas', JSON.stringify(userRecetas));
      }

      createAllCards();
      render();
    });
  </script>
</body>
</html>
