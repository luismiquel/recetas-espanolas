<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recetas de Cocina Española</title>
  <style>
    body { font-family: sans-serif; margin:0; padding:0; background:#fff8f0; color:#333; }
    header { background:#d62828; color:white; padding:1rem; text-align:center; }
    nav { background:#f4a261; padding:0.5rem; text-align:center; }
    nav a { margin:0 1rem; color:white; text-decoration:none; font-weight:bold; }
    .controls { padding:1rem; text-align:center; background:#e9ddd1; }
    .controls input, .controls select { margin:0 0.5rem; padding:0.5rem; font-size:1rem; }
    .controls label { margin: 0 0.5rem; font-size:1rem; }
    section { padding:2rem; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:1rem; margin-top:1rem; }
    h2 { color:#d62828; margin-top:0; }
    .receta { position:relative; background:white; border-radius:8px; padding:1rem; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .receta img { width:100%; border-radius:8px; }
    .info { font-size:0.9rem; color:#666; margin-top:0.5rem; }
    #debug { text-align:center; padding:1rem; background:#f0e8dd; font-weight:bold; margin:1rem; }
    .star { position:absolute; top:8px; right:8px; font-size:1.5rem; cursor:pointer; color:#ccc; }
    .star.fav { color: #e74c3c; }
  </style>
</head>
<body>
  <header>
    <h1>Recetas de Cocina Española</h1>
    <p>Auténticas recetas organizadas por tiempos de comida</p>
  </header>
  <nav>
    <a href="#aperitivos">Aperitivos</a>
    <a href="#primer-plato">Primer Plato</a>
    <a href="#segundo-plato">Segundo Plato</a>
    <a href="#postre">Postre</a>
  </nav>
  <div class="controls">
    <input type="text" id="search" placeholder="Buscar recetas...">
    <select id="sort">
      <option value="">Ordenar por tiempo</option>
      <option value="asc">Tiempo ascendente</option>
      <option value="desc">Tiempo descendente</option>
    </select>
    <label><input type="checkbox" id="favoritesOnly"> Solo favoritas</label>
  </div>

  <section id="aperitivos">
    <h2>🧀 Aperitivos</h2>
    <div class="grid" id="contenedor-aperitivos"></div>
  </section>

  <section id="primer-plato">
    <h2>🥗 Primer Plato</h2>
    <div class="grid" id="contenedor-primer-plato"></div>
  </section>

  <section id="segundo-plato">
    <h2>🍖 Segundo Plato</h2>
    <div class="grid" id="contenedor-segundo-plato"></div>
  </section>

  <section id="postre">
    <h2>🍮 Postre</h2>
    <div class="grid" id="contenedor-postre"></div>
  </section>

  <script defer>
    const categorias = ['aperitivos','primer-plato','segundo-plato','postre'];
    const recetas = [];
    // Genera 40 recetas de ejemplo
    categorias.forEach(cat => {
      for(let i=1;i<=10;i++) recetas.push({
        categoria: cat,
        titulo: `Receta ${i} de ${cat.replace('-', ' ')}`,
        img: 'https://via.placeholder.com/300x200?text=' + encodeURIComponent(`Receta ${i}`),
        descripcion: `Descripción de Receta ${i}`,
        ingredientes: 'Ingrediente A, Ingrediente B',
        instrucciones: 'Mezclar y cocinar.',
        tiempo: 20 + i * 5, // minutos
        dificultad: ['Fácil','Media','Alta'][i%3],
        fav: false
      });
    });

    // Carga estado de favoritos
    const favs = JSON.parse(localStorage.getItem('favs')||'{}');
    recetas.forEach(r => { if(favs[r.titulo]) r.fav=true; });

    document.addEventListener('DOMContentLoaded', () => {
      alert(`Script cargado: ${recetas.length} recetas disponibles`);
      const debug = document.createElement('div');
      debug.id = 'debug';
      debug.textContent = `Recetas cargadas: ${recetas.length}`;
      document.body.insertBefore(debug, document.querySelector('section'));

      const contenedores = {};
      categorias.forEach(cat => contenedores[cat] = document.getElementById(`contenedor-${cat}`));

      function saveFavs() {
        const store = {};
        recetas.forEach(r=>{ if(r.fav) store[r.titulo]=true; });
        localStorage.setItem('favs', JSON.stringify(store));
      }

      function render(list) {
        categorias.forEach(cat => contenedores[cat].innerHTML = '');
        list.forEach(r => {
          if(document.getElementById('favoritesOnly').checked && !r.fav) return;
          const card = document.createElement('div');
          card.className = 'receta';
          card.dataset.tiempo = r.tiempo;
          card.innerHTML = `
            <div class="star ${r.fav?'fav':''}" data-title="${r.titulo}">★</div>
            <h3>${r.titulo}</h3>
            <img src="${r.img}" alt="${r.titulo}">
            <p><strong>Descripción:</strong> ${r.descripcion}</p>
            <p><strong>Ingredientes:</strong> ${r.ingredientes}</p>
            <p><strong>Instrucciones:</strong> ${r.instrucciones}</p>
            <p class="info">⏱ ${r.tiempo} min | 🔥 ${r.dificultad}</p>
          `;
          contenedores[r.categoria].appendChild(card);
        });
        // Añadir listener a estrellas
        document.querySelectorAll('.star').forEach(star=>{
          star.onclick = () => {
            const title = star.dataset.title;
            const rec = recetas.find(r=>r.titulo===title);
            rec.fav = !rec.fav;
            saveFavs();
            render(filteredRecetas());
          };
        });
      }

      function filteredRecetas() {
        let res = [...recetas];
        const term = document.getElementById('search').value.toLowerCase();
        if(term) res = res.filter(r=> r.titulo.toLowerCase().includes(term) || r.descripcion.toLowerCase().includes(term));
        const sortv = document.getElementById('sort').value;
        if(sortv==='asc') res.sort((a,b)=>a.tiempo-b.tiempo);
        if(sortv==='desc') res.sort((a,b)=>b.tiempo-a.tiempo);
        return res;
      }

      // Eventos controles
      document.getElementById('search').addEventListener('input', ()=> render(filteredRecetas()));
      document.getElementById('sort').addEventListener('change', ()=> render(filteredRecetas()));
      document.getElementById('favoritesOnly').addEventListener('change', ()=> render(filteredRecetas()));

      render(recetas);
    });
  </script>
</body>
</html>
