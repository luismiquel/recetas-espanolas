<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recetas de Cocina Española</title>
  <style>
    :root { --bg: #fff8f0; --fg: #333; --primary: #d62828; --secondary: #f4a261; }
    [data-theme="dark"] { --bg: #2b2b2b; --fg: #eee; --primary: #ff7f50; --secondary: #555; }
    body { font-family: sans-serif; margin:0; padding:0; background:var(--bg); color:var(--fg); transition: background .3s, color .3s; }
    header { background:var(--primary); color:white; padding:1rem; text-align:center; }
    nav { background:var(--secondary); padding:0.5rem; text-align:center; }
    nav a { margin:0 1rem; color:white; text-decoration:none; font-weight:bold; }
    .controls { padding:1rem; text-align:center; background:var(--secondary); }
    .controls input, .controls select, .controls button { margin:0 .5rem; padding:.5rem; font-size:1rem; }
    section { padding:2rem; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:1rem; margin-top:1rem; }
    .receta { position:relative; background:var(--bg); border-radius:8px; padding:1rem; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer; }
    .receta img { width:100%; border-radius:8px; }
    .info { font-size:.9rem; color:var(--fg); margin-top:.5rem; }
    .star { position:absolute; top:8px; right:8px; font-size:1.5rem; cursor:pointer; color:#ccc; }
    .star.fav { color:#e74c3c; }
    #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
    #modal .content { background:white; padding:2rem; border-radius:8px; max-width:500px; width:90%; position:relative; }
    #modal .close { position:absolute; top:10px; right:10px; cursor:pointer; font-size:1.5rem; }
  </style>
</head>
<body data-theme="light">
  <header>
    <h1>Recetas de Cocina Española</h1>
    <p>Auténticas recetas organizadas por tiempos de comida</p>
  </header>
  <nav>
    <a href="#aperitivos">Aperitivos</a>
    <a href="#primer-plato">Primer Plato</a>
    <a href="#segundo-plato">Segundo Plato</a>
    <a href="#postre">Postre</a>
  </nav>
  <div class="controls">
    <input type="text" id="search" placeholder="Buscar recetas...">
    <select id="sort">
      <option value="">Ordenar por tiempo</option>
      <option value="asc">Tiempo ascendente</option>
      <option value="desc">Tiempo descendente</option>
    </select>
    <label><input type="checkbox" id="favoritesOnly"> Solo favoritas</label>
    <button id="themeToggle">🌙</button>
  </div>

  <section id="aperitivos">
    <h2>🧀 Aperitivos</h2>
    <div class="grid" id="contenedor-aperitivos"></div>
  </section>

  <section id="primer-plato">
    <h2>🥗 Primer Plato</h2>
    <div class="grid" id="contenedor-primer-plato"></div>
  </section>

  <section id="segundo-plato">
    <h2>🍖 Segundo Plato</h2>
    <div class="grid" id="contenedor-segundo-plato"></div>
  </section>

  <section id="postre">
    <h2>🍮 Postre</h2>
    <div class="grid" id="contenedor-postre"></div>
  </section>

  <div id="modal">
    <div class="content">
      <span class="close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script defer>
    const categorias=['aperitivos','primer-plato','segundo-plato','postre'], recetas=[];
    categorias.forEach(cat=>{ for(let i=1;i<=10;i++) recetas.push({ categoria:cat, titulo:`Receta ${i} de ${cat}`, img:`https://via.placeholder.com/300x200?text=${encodeURIComponent(`Receta ${i}`)}`, descripcion:`Descripción ${i}`, ingredientes:`Ingrediente A, Ingrediente B`, instrucciones:`Pasos de Receta ${i}`, tiempo:20+i*5, dificultad:['Fácil','Media','Alta'][i%3], fav:false }); });
    const favs=JSON.parse(localStorage.getItem('favs')||'{}'); recetas.forEach(r=>{ if(favs[r.titulo]) r.fav=true; });
    document.addEventListener('DOMContentLoaded',()=>{
      const debug=document.createElement('div'); debug.id='debug'; debug.textContent=`Recetas: ${recetas.length}`; document.body.insertBefore(debug,document.querySelector('section'));
      const cont={}; categorias.forEach(c=>cont[c]=document.getElementById(`contenedor-${c}`));
      const modal=document.getElementById('modal'), modalBody=document.getElementById('modalBody');
      document.querySelector('#modal .close').onclick=()=>modal.style.display='none';
      document.getElementById('themeToggle').onclick=()=>{
        const b=document.body, t=b.dataset.theme='dark'===b.dataset.theme?'light':'dark';
        document.getElementById('themeToggle').textContent=t==='dark'?'☀️':'🌙';
      };
      function save(){ localStorage.setItem('favs',JSON.stringify(recetas.filter(r=>r.fav).reduce((a,r)=>(a[r.titulo]=true,a),{}))); }
      function render(list){ categorias.forEach(c=>cont[c].innerHTML=''); list.forEach(r=>{
        if(document.getElementById('favoritesOnly').checked&&!r.fav) return;
        const card=document.createElement('div'); card.className='receta'; card.dataset.tiempo=r.tiempo; card.innerHTML=`<div class="star ${r.fav?'fav':''}" data-title="${r.titulo}">★</div><h3>${r.titulo}</h3><img src="${r.img}" alt="${r.titulo}"><p><strong>Descripción:</strong> ${r.descripcion}</p><p class="info">⏱${r.tiempo}min | 🔥${r.dificultad}</p>`;
        card.onclick=()=>{ modalBody.innerHTML=`<h2>${r.titulo}</h2><p>${r.descripcion}</p><p><strong>Ingredientes:</strong> ${r.ingredientes}</p><p><strong>Instrucciones:</strong> ${r.instrucciones}</p>`; modal.style.display='flex'; };
        cont[r.categoria].appendChild(card);
      }); document.querySelectorAll('.star').forEach(s=>s.onclick=e=>{ e.stopPropagation(); const t=s.dataset.title, rec=recetas.find(r=>r.titulo===t); rec.fav=!rec.fav; save(); render(filtered()); }); }
      function filtered(){ let r=[...recetas]; const term=document.getElementById('search').value.toLowerCase(); if(term) r=r.filter(x=>x.titulo.toLowerCase().includes(term)||x.descripcion.toLowerCase().includes(term)); const s=document.getElementById('sort').value; if(s==='asc') r.sort((a,b)=>a.tiempo-b.tiempo); if(s==='desc') r.sort((a,b)=>b.tiempo-a.tiempo); return r; }
      ['search','sort','favoritesOnly'].forEach(id=>document.getElementById(id).addEventListener('input',()=>render(filtered())));
      render(recetas);
    });
  </script>
</body>
</html>
